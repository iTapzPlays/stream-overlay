<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iTapzPlays – Session HUD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 16px;
    min-height: 100vh;
  }

  @keyframes hudIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hud {
    background: rgba(8,10,8,0.93);
    border: 1px solid rgba(212,255,79,0.18);
    border-radius: 10px;
    padding: 16px 20px 14px;
    color: #e8efe6;
    box-shadow: 0 10px 36px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.3);
    animation: hudIn 0.45s cubic-bezier(0.16,1,0.3,1);
    min-width: 280px;
  }

  /* ── Hero: uptime + pulse line ── */
  .hero-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .hero-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #6b7a6b;
  }
  .hero-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px; font-weight: 700;
    color: #d4ff4f;
    letter-spacing: -0.01em;
    line-height: 1;
    text-shadow: 0 0 18px rgba(212,255,79,0.35), 0 2px 4px rgba(0,0,0,0.8);
  }
  .live-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,84,112,0.12);
    border: 1px solid rgba(255,84,112,0.4);
    border-radius: 20px; padding: 3px 9px 3px 7px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: #ff5470;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ff5470;
    box-shadow: 0 0 6px rgba(255,84,112,0.8);
    animation: livePulse 1.4s ease-in-out infinite;
  }
  @keyframes livePulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.4; transform:scale(0.8)} }

  /* ── Signature pulse waveform ── */
  .pulse-line {
    width: 100%; height: 22px; margin-top: 8px;
    overflow: hidden; position: relative;
  }
  .pulse-line svg { width: 200%; height: 100%; display: block; }
  .pulse-path {
    fill: none;
    stroke: #d4ff4f;
    stroke-width: 1.5;
    opacity: 0.55;
    filter: drop-shadow(0 0 3px rgba(212,255,79,0.5));
  }
  @keyframes pulseScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .pulse-line svg { animation: pulseScroll var(--pulse-speed, 6s) linear infinite; }

  .divider-thin { border: none; border-top: 1px solid rgba(212,255,79,0.1); margin: 12px 0 10px; }

  /* ── Pill strip ── */
  .pill-strip { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    background: #14180f;
    border: 1px solid rgba(212,255,79,0.12);
    border-radius: 8px;
    padding: 7px 10px;
    display: flex; flex-direction: column; gap: 2px;
    flex: 1; min-width: 84px;
    transition: border-color 0.3s, transform 0.2s;
  }
  .pill:hover { border-color: rgba(212,255,79,0.4); transform: translateY(-1px); }
  .pill-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 8.5px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #6b7a6b;
  }
  .pill-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 700;
    color: #e8efe6;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .pill-value.accent { color: #d4ff4f; }
  .pill-value.pink { color: #ff5470; }

  @keyframes flashGreen {
    0%   { color: #d4ff4f; text-shadow: 0 0 10px rgba(212,255,79,0.8); }
    100% { color: inherit; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  }
  .pill-value.flash { animation: flashGreen 0.8s ease; }

  /* ── Game tag ── */
  .game-tag {
    margin-top: 10px;
    display: flex; align-items: center; gap: 7px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px; font-weight: 600;
    color: #6b7a6b;
  }
  .game-tag .dot { width: 5px; height: 5px; border-radius: 50%; background: #d4ff4f; }
  .game-tag span.game-name { color: #e8efe6; }

  /* ── Shoutout banner ── */
  @keyframes shoutIn {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .shoutout {
    margin-top: 10px;
    background: linear-gradient(90deg, rgba(212,255,79,0.1), transparent);
    border-left: 2px solid #d4ff4f;
    padding: 6px 10px;
    font-size: 11px;
    color: #c8d6c4;
    display: none;
    animation: shoutIn 0.4s ease;
  }
  .shoutout.show { display: block; }
  .shoutout b { color: #d4ff4f; }
</style>
</head>
<body>

<div class="hud" id="hud">

  <div class="hero-row">
    <div>
      <div class="hero-label">Session Uptime</div>
      <div class="hero-value" id="uptime">00:00:00</div>
    </div>
    <div class="live-pill"><span class="live-dot"></span>LIVE</div>
  </div>

  <div class="pulse-line">
    <svg viewBox="0 0 200 22" preserveAspectRatio="none">
      <path class="pulse-path" d="M0,11 L20,11 L25,2 L30,20 L35,11 L60,11 L65,4 L70,18 L75,11 L100,11 L105,2 L110,20 L115,11 L140,11 L145,4 L150,18 L155,11 L180,11 L185,2 L190,20 L195,11 L200,11" />
      <path class="pulse-path" d="M200,11 L220,11 L225,2 L230,20 L235,11 L260,11 L265,4 L270,18 L275,11 L300,11 L305,2 L310,20 L315,11 L340,11 L345,4 L350,18 L355,11 L380,11 L385,2 L390,20 L395,11 L400,11" />
    </svg>
  </div>

  <hr class="divider-thin" />

  <div class="pill-strip">
    <div class="pill">
      <div class="pill-label">Last Event</div>
      <div class="pill-value accent" id="last-event">--</div>
    </div>
    <div class="pill">
      <div class="pill-label">Followers</div>
      <div class="pill-value" id="followers">--</div>
    </div>
    <div class="pill">
      <div class="pill-label">Subs</div>
      <div class="pill-value" id="subs">--</div>
    </div>
    <div class="pill">
      <div class="pill-label">Sub Goal</div>
      <div class="pill-value pink" id="sub-goal-display">0/10</div>
    </div>
  </div>

  <div class="game-tag">
    <span class="dot"></span>
    Now playing: <span class="game-name" id="game-name">Not set</span>
  </div>

  <div class="shoutout" id="shoutout">
    <b id="shoutout-name">—</b> <span id="shoutout-text"></span>
  </div>

</div>

<script>
  const KICK_USERNAME = 'iTapzPlays';

  // ── Session uptime ─────────────────────────────────────
  let sessionStart = Date.now();
  // Persist across accidental reloads, but auto-reset if stale (>12h = new stream day)
  const savedStart = parseInt(localStorage.getItem('session_start') || '0');
  const twelveHours = 12 * 60 * 60 * 1000;
  if (savedStart && (Date.now() - savedStart) < twelveHours) {
    sessionStart = savedStart;
  } else {
    localStorage.setItem('session_start', String(sessionStart));
  }

  function updateUptime() {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
  }
  updateUptime();
  setInterval(updateUptime, 1000);

  // ── Last event tracker (real data, drives pulse speed) ──
  let lastEventTime = null;
  function markEvent() {
    lastEventTime = Date.now();
    document.getElementById('hud').style.setProperty('--pulse-speed', '2.5s');
  }
  function updateLastEvent() {
    const el = document.getElementById('last-event');
    if (!lastEventTime) { el.textContent = '--'; return; }
    const secs = Math.floor((Date.now() - lastEventTime) / 1000);
    if (secs < 60) el.textContent = `${secs}s ago`;
    else if (secs < 3600) el.textContent = `${Math.floor(secs/60)}m ago`;
    else el.textContent = `${Math.floor(secs/3600)}h ago`;
    // Pulse line settles back to idle speed after 30s of no events
    if (secs > 30) document.getElementById('hud').style.setProperty('--pulse-speed', '7s');
  }
  setInterval(updateLastEvent, 1000);

  // ── Kick stats ─────────────────────────────────────────
  let lastFollowers = null, lastSubs = null;
  let subGoal = 10;

  function flashValue(el) {
    if (!el) return;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function showShoutout(name, text) {
    const box = document.getElementById('shoutout');
    document.getElementById('shoutout-name').textContent = name;
    document.getElementById('shoutout-text').textContent = text;
    box.classList.add('show');
    clearTimeout(box._timer);
    box._timer = setTimeout(() => box.classList.remove('show'), 6000);
  }

  async function fetchKickStats() {
    try {
      const r = await fetch(`https://kick.com/api/v2/channels/${KICK_USERNAME}`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!r.ok) throw new Error();
      const d = await r.json();
      const followers = d.followers_count ?? d.followersCount ?? null;
      const subs = d.subscribers_count ?? d.subscriberCount ?? null;

      if (followers !== null) {
        document.getElementById('followers').textContent = formatNum(followers);
        if (lastFollowers !== null && followers > lastFollowers) {
          flashValue(document.getElementById('followers'));
          showShoutout('New follower', `welcome to the crew! (${formatNum(followers)} total)`);
          markEvent();
        }
        lastFollowers = followers;
      }
      if (subs !== null) {
        document.getElementById('subs').textContent = formatNum(subs);
        document.getElementById('sub-goal-display').textContent = `${subs}/${subGoal}`;
        if (lastSubs !== null && subs > lastSubs) {
          flashValue(document.getElementById('subs'));
          showShoutout('New sub', 'thank you for the support!');
          markEvent();
        }
        lastSubs = subs;
      }
    } catch {}
  }

  function formatNum(n) {
    if (typeof n !== 'number' || isNaN(n)) return '--';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
  }

  fetchKickStats();
  setInterval(fetchKickStats, 30000);

  // ── Manual game tag + sub goal (via URL params: ?game=Valorant&subgoal=25) ──
  const params = new URLSearchParams(window.location.search);
  const game = params.get('game');
  if (game) document.getElementById('game-name').textContent = game;
  const urlSubGoal = parseInt(params.get('subgoal'));
  if (!isNaN(urlSubGoal) && urlSubGoal > 0) subGoal = urlSubGoal;

  // ── Chat commands (same Cloudflare Worker polling as the location overlay) ──
  const WORKER_URL = 'https://icy-butterfly-8b83.itapzplays.workers.dev';

  function handleChatCommand(text) {
    const parts = text.trim().split(/\s+/);
    const cmd = parts[0]?.toLowerCase();

    if (cmd === '!subgoal') {
      const val = parseInt(parts[1]);
      if (!isNaN(val) && val > 0) {
        subGoal = val;
        document.getElementById('sub-goal-display').textContent = `${lastSubs ?? 0}/${subGoal}`;
      }
    }
    else if (cmd === '!game') {
      const name = parts.slice(1).join(' ');
      if (name) document.getElementById('game-name').textContent = name;
    }
    else if (cmd === '!streamstart') {
      // Resets uptime to 0 starting now — use when you actually go live
      sessionStart = Date.now();
      localStorage.setItem('session_start', String(sessionStart));
      updateUptime();
    }
    else if (cmd === '!resethud') {
      sessionStart = Date.now();
      localStorage.setItem('session_start', String(sessionStart));
      subGoal = 10;
      lastEventTime = null;
      document.getElementById('game-name').textContent = 'Not set';
      document.getElementById('sub-goal-display').textContent = `0/10`;
      updateUptime();
    }
  }

  let cmdCursor = parseInt(localStorage.getItem('hud_cmd_cursor') || '0');

  async function pollCommandsFromWorker() {
    try {
      await fetch(WORKER_URL + '/listen-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      const r = await fetch(WORKER_URL + '/commands?since=' + cmdCursor);
      const d = await r.json();
      const commands = d.commands ?? [];
      commands.forEach(cmd => handleChatCommand(cmd));
      if (typeof d.latestId === 'number') {
        cmdCursor = d.latestId;
        localStorage.setItem('hud_cmd_cursor', String(cmdCursor));
      }
    } catch {}
  }
  pollCommandsFromWorker();
  setInterval(pollCommandsFromWorker, 3000);
</script>
</body>
</html>
